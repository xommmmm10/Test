<!DOCTYPE html>
<html>
<head>
    <title>Lightning McQueen - Three.js</title>
    <style> body { margin: 0; overflow: hidden; background: #222; } </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // --- CAR BODY (The Red Shell) ---
        const carGroup = new THREE.Group();
        
        // Main Red Body
        const bodyGeom = new THREE.BoxGeometry(4, 1, 2);
        const redMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const body = new THREE.Mesh(bodyGeom, redMat);
        carGroup.add(body);

        // Cockpit / Roof
        const roofGeom = new THREE.BoxGeometry(2, 0.8, 1.8);
        const roof = new THREE.Mesh(roofGeom, redMat);
        roof.position.set(-0.5, 0.8, 0);
        carGroup.add(roof);

        // --- THE DECAL (Lightning Bolt) ---
        const boltGeom = new THREE.PlaneGeometry(2, 0.5);
        const boltMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
        const bolt = new THREE.Mesh(boltGeom, boltMat);
        bolt.position.set(0, 0.1, 1.01); // Stick to the side
        carGroup.add(bolt);

        // --- WHEELS ---
        const wheelGeom = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        
        const wheelPositions = [
            [1.5, -0.5, 1], [1.5, -0.5, -1],
            [-1.5, -0.5, 1], [-1.5, -0.5, -1]
        ];

        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeom, wheelMat);
            wheel.rotation.x = Math.PI / 2;
            wheel.position.set(...pos);
            carGroup.add(wheel);
        });

        scene.add(carGroup);
        camera.position.set(5, 3, 5);
        camera.lookAt(0, 0, 0);

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            carGroup.rotation.y += 0.01; // Spin the car to show it off
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
