<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Idle Clicker Game</title>

<style>
body{
    background:#0b0f1a;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#4da6ff;
    text-shadow:0 0 10px #4da6ff;
}

#money{
    font-size:40px;
    margin:20px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4da6ff;
    color:white;
    cursor:pointer;
    box-shadow:0 0 15px #4da6ff;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.shop{
    margin-top:30px;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    width:250px;
    margin-left:auto;
    margin-right:auto;
}
</style>
</head>

<body>

<h1>Idle Money Game</h1>

<div id="money">Money: 0</div>

<button onclick="clickMoney()">Click +1</button>

<div class="shop">
<h3>Shop</h3>

<button onclick="buyAuto()">Buy Auto Clicker (50)</button>
<p id="auto">Auto Clickers: 0</p>

</div>

<script>

let money = 0
let auto = 0

function update(){
document.getElementById("money").innerText = "Money: " + money
document.getElementById("auto").innerText = "Auto Clickers: " + auto
}

function clickMoney(){
money += 1
update()
}

function buyAuto(){
if(money >= 50){
money -= 50
auto += 1
update()
}
}

setInterval(function(){
money += auto
update()
},1000)

update()

</script>

</body>
</html>
