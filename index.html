<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bashdar Technology</title>

<style>

body{
background:black;
font-family:Arial;
color:white;
text-align:center;
}

/* Title */

h1{
margin-top:40px;
font-size:50px;
color:white;
text-shadow:0 0 10px #00ccff,0 0 30px #00ccff;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #00ccff;}
to{ text-shadow:0 0 30px #00ccff,0 0 50px white;}
}

/* Table */

table{
margin:auto;
margin-top:60px;
width:60%;
border-collapse:collapse;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 20px #00ccff;
border-radius:15px;
overflow:hidden;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

th{
background:#001a33;
color:#00ccff;
padding:15px;
font-size:22px;
}

td{
padding:15px;
font-size:18px;
border-top:1px solid rgba(255,255,255,0.2);
cursor:pointer;
transition:0.3s;
}

tr:hover{
background:rgba(0,204,255,0.2);
transform:scale(1.02);
}

/* Footer */

footer{
margin-top:60px;
color:#aaa;
}

</style>
</head>

<body>

<h1>Bashdar Technology</h1>

<!-- Music -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<table>

<tr>
<th>Social Media</th>
<th>Click</th>
</tr>

<tr onclick="openLink('https://facebook.com')">
<td>Facebook</td>
<td>Open</td>
</tr>

<tr onclick="openLink('https://tiktok.com')">
<td>TikTok</td>
<td>Open</td>
</tr>

<tr onclick="openLink('https://snapchat.com')">
<td>Snapchat</td>
<td>Open</td>
</tr>

<tr onclick="showDetails()">
<td>Details</td>
<td>View</td>
</tr>

</table>

<div id="details" style="display:none;margin-top:40px;">
<h2>Social Details</h2>
<p>Welcome to Bashdar Technology social media page.</p>
</div>

<footer>
<p>© Bashdar Technology</p>
</footer>

<script>

function openLink(link){
window.open(link,"_blank");
}

function showDetails(){
document.getElementById("details").style.display="block";
}

</script>

</body>
</html>
