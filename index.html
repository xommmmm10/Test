<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bashdar Technology</title>

<style>

body{
  index.html
background.jpg   (9:16 image)
music.mp3
margin:0;
font-family:Arial;
color:white;
text-align:center;

/* 9:16 background photo */
background:url("background.jpg") no-repeat center center/cover;
height:100vh;
}

/* Dark overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* Title */

h1{
margin-top:40px;
font-size:50px;
text-shadow:0 0 10px #00ccff,0 0 35px #00ccff;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #00ccff;}
to{ text-shadow:0 0 35px #00ccff,0 0 60px white;}
}

/* Table */

table{
margin:auto;
margin-top:60px;
width:60%;
border-collapse:collapse;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
box-shadow:0 0 20px #00ccff;
overflow:hidden;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

th{
background:#001a33;
padding:15px;
font-size:22px;
color:#00ccff;
}

td{
padding:15px;
font-size:18px;
border-top:1px solid rgba(255,255,255,0.2);
cursor:pointer;
transition:0.3s;
}

tr:hover{
background:rgba(0,204,255,0.2);
transform:scale(1.02);
}

/* Social logos */

.logo{
width:28px;
vertical-align:middle;
margin-right:10px;
}

/* Footer */

footer{
margin-top:50px;
color:#aaa;
}

</style>
</head>

<body>

<h1>Bashdar Technology</h1>

<!-- Background Music -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<table>

<tr>
<th>Social Media</th>
<th>Open</th>
</tr>

<tr onclick="openLink('https://facebook.com')">
<td>
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
Facebook
</td>
<td>Click</td>
</tr>

<tr onclick="openLink('https://tiktok.com')">
<td>
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
TikTok
</td>
<td>Click</td>
</tr>

<tr onclick="openLink('https://snapchat.com')">
<td>
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/733/733614.png">
Snapchat
</td>
<td>Click</td>
</tr>

<tr onclick="showDetails()">
<td>ℹ️ Details</td>
<td>View</td>
</tr>

</table>

<div id="details" style="display:none;margin-top:30px;">
<h2>Social Media Details</h2>
<p>Follow Bashdar Technology on social media.</p>
</div>

<footer>
© Bashdar Technology
</footer>

<script>

function openLink(link){
window.open(link,"_blank");
}

function showDetails(){
document.getElementById("details").style.display="block";
}

</script>

</body>
</html>
