<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Idle Game - Bashdar Technology</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0a0a0a,#001f3f);
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    font-size:40px;
    color:#4fc3ff;
    text-shadow:0 0 10px #4fc3ff;
}

#game{
    margin-top:40px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
    background:#1e90ff;
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px #1e90ff;
}

.panel{
    margin:20px auto;
    padding:20px;
    width:300px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<h1>Bashdar Idle Game</h1>

<div id="game">

<div class="panel">
<h2>Money: $<span id="money">0</span></h2>
<h3>Income/sec: $<span id="income">0</span></h3>
</div>

<button onclick="clickMoney()">💰 Click Money</button>

<div class="panel">

<h3>Upgrades</h3>

<button onclick="buyWorker()">
Hire Worker ($50)
</button>

<button onclick="buyFactory()">
Buy Factory ($200)
</button>

<button onclick="buyAI()">
AI Manager ($1000)
</button>

</div>

</div>

<script>

let game={
money:0,
income:0,
workers:0,
factories:0,
ai:0
}

function updateUI(){
document.getElementById("money").innerText=Math.floor(game.money)
document.getElementById("income").innerText=game.income
}

function clickMoney(){
game.money+=1
updateUI()
}

function buyWorker(){

if(game.money>=50){

game.money-=50
game.workers++

game.income+=1

updateUI()

}

}

function buyFactory(){

if(game.money>=200){

game.money-=200
game.factories++

game.income+=5

updateUI()

}

}

function buyAI(){

if(game.money>=1000){

game.money-=1000
game.ai++

game.income+=20

updateUI()

}

}

setInterval(function(){

game.money+=game.income

updateUI()

},1000)

function saveGame(){

localStorage.setItem("idleGameSave",JSON.stringify(game))

}

function loadGame(){

let save=JSON.parse(localStorage.getItem("idleGameSave"))

if(save){

game=save

}

}

setInterval(saveGame,5000)

loadGame()
updateUI()

</script>

</body>
</html>
