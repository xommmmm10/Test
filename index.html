<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bashdar Technology</title>

<style>

body{
background: linear-gradient(180deg,#000,#020b1f);
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* Title */
h1{
font-size:50px;
margin-top:30px;
color:white;
text-shadow:0 0 10px #00ccff,0 0 25px #00ccff;
animation: glow 3s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #00ccff;}
to{ text-shadow:0 0 25px #00ccff,0 0 40px white;}
}

/* Table */

table{
margin:auto;
margin-top:60px;
border-spacing:30px;
animation: float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Social Boxes */

.box{
width:180px;
height:120px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:15px;
box-shadow:0 0 15px #00ccff;
transition:0.4s;
cursor:pointer;
}

.box:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00ccff,0 0 40px white;
}

a{
color:white;
font-size:20px;
text-decoration:none;
}

/* Details */

.details{
margin-top:40px;
padding:20px;
width:60%;
margin-left:auto;
margin-right:auto;
background:rgba(255,255,255,0.05);
border-radius:15px;
box-shadow:0 0 15px #00ccff;
display:none;
}

button{
background:#00ccff;
border:none;
padding:10px 20px;
border-radius:10px;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Bashdar Technology</h1>

<!-- Music -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<table>
<tr>

<td>
<div class="box">
<a href="https://facebook.com" target="_blank">
Facebook
</a>
</div>
</td>

<td>
<div class="box">
<a href="https://tiktok.com" target="_blank">
TikTok
</a>
</div>
</td>

<td>
<div class="box">
<a href="https://snapchat.com" target="_blank">
Snapchat
</a>
</div>
</td>

<td>
<div class="box" onclick="showDetails()">
Details
</div>
</td>

</tr>
</table>

<div class="details" id="details">

<h2>Social Media Details</h2>

<p>
Facebook, TikTok, and Snapchat links of Bashdar Technology.
</p>

<button onclick="hideDetails()">Close</button>

</div>

<script>

function showDetails(){
document.getElementById("details").style.display="block";
}

function hideDetails(){
document.getElementById("details").style.display="none";
}

</script>

</body>
</html>
